# AGENTS.md §9.3: "Toggle the font-size preset compact ↔ comfortable
# several times. The last line in each row must remain fully visible."
#
# This flow is the primary E2E guard for the §4.2 ComposeView height
# bug — toggling the preset is the same code path that originally
# triggered the bottom-line clipping on Android. The Compose UI
# instrumented test (AdaptiveTextViewHeightTest) pins the View-level
# invariant; this flow pins the user-observable outcome with a
# screenshot diff.
appId: adaptivetext.example
tags:
  - android
  - ios
---
- launchApp:
    clearState: true
# Wait for HomeScreen JS to mount before any interaction. `clearState`
# forces a cold start which on the CI emulator takes 8–15 s; without
# this gate the next step would race the React Native bootstrap. See
# 01-resizable.yaml for the canonical comment.
- assertVisible: "Adaptive Text"
# Home row by testID — see 00-launch.yaml for rationale.
#
# `ScrollView` is row 4/11 on Home. It's visible on most local Android
# emulators but lands right at (or just past) the fold on the CI
# `pixel_6` profile after the system bar, RN stack header, and hero
# block consume vertical space. Maestro's `tapOn` auto-scroll inside
# RN's <ScrollView> is unreliable (see 11-theme-toggle.yaml for the
# canonical comment on this), so we drive the scroll explicitly. If
# the row is already on-screen, scrollUntilVisible returns immediately
# and adds no measurable cost.
- scrollUntilVisible:
    element:
      id: "ScrollView"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "ScrollView"
- assertVisible: "comfortable"
- takeScreenshot: 04-scrollview-comfortable-1

- tapOn: "compact"
- takeScreenshot: 04-scrollview-compact-1

- tapOn: "comfortable"
- takeScreenshot: 04-scrollview-comfortable-2

- tapOn: "compact"
- takeScreenshot: 04-scrollview-compact-2

# Final back to comfortable — this is the iteration that previously
# regressed (§4.2). The bottom of the comfortable text must remain
# visible after the third toggle.
- tapOn: "comfortable"
- takeScreenshot: 04-scrollview-comfortable-3
