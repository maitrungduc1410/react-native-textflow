buildscript {
  ext.AdaptiveText = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36,
    composeBomVersion: "2026.05.00",
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return AdaptiveText[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
    classpath "org.jetbrains.kotlin:compose-compiler-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "org.jetbrains.kotlin.plugin.compose"

apply plugin: "com.facebook.react"

android {
  namespace "com.adaptivetext"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
    compose true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

dependencies {
  implementation "com.facebook.react:react-android"

  def composeBom = platform("androidx.compose:compose-bom:${getExtOrDefault('composeBomVersion')}")
  implementation composeBom

  // Compose runtime + UI primitives.
  implementation "androidx.compose.runtime:runtime"
  implementation "androidx.compose.ui:ui"
  implementation "androidx.compose.foundation:foundation"
  implementation "androidx.compose.foundation:foundation-layout"
  implementation "androidx.compose.animation:animation"
  implementation "androidx.compose.animation:animation-core"
  implementation "androidx.compose.material3:material3"

  // Required to host a ComposeView inside a non-AppCompat React Activity.
  implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.7"
  implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7"
  implementation "androidx.savedstate:savedstate-ktx:1.2.1"
}
